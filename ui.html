<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --bg-secondary: #f5f5f5;
        --border: #e0e0e0;
        --text: #111111;
        --text-secondary: #717171;
        --accent: #111111;
        --accent-hover: #333333;
        --input-bg: #ffffff;
        --radius: 6px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: Inter, -apple-system, "Segoe UI", system-ui, sans-serif;
        margin: 0;
        padding: 20px;
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
        line-height: 1.4;
      }
      h2 {
        margin: 0 0 20px;
        font-weight: 600;
        font-size: 15px;
        letter-spacing: -0.01em;
      }

      /* --- Sections --- */
      .section {
        margin-bottom: 16px;
      }
      .section-title {
        font-size: 11px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-secondary);
        margin: 0 0 8px;
      }

      /* --- Form elements --- */
      label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        margin: 0 0 4px;
        color: var(--text);
      }
      input[type="text"],
      input[type="password"],
      input[type="number"],
      textarea,
      select {
        width: 100%;
        padding: 7px 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-size: 12px;
        background: var(--input-bg);
        color: var(--text);
        outline: none;
        transition: border-color 0.15s;
      }
      input[type="text"]:focus,
      input[type="password"]:focus,
      input[type="number"]:focus,
      textarea:focus,
      select:focus {
        border-color: #999;
      }
      textarea {
        min-height: 72px;
        resize: vertical;
        font-family: inherit;
      }
      select {
        appearance: none;
        background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23999' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 10px center;
        padding-right: 28px;
      }

      /* --- Field group (label + input) --- */
      .field {
        margin-bottom: 12px;
      }
      .field:last-child {
        margin-bottom: 0;
      }

      /* --- Row layout --- */
      .row {
        display: flex;
        gap: 10px;
      }
      .row > .field {
        flex: 1;
      }

      /* --- Toggle rows (checkbox options) --- */
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid var(--bg-secondary);
      }
      .toggle-row:last-child {
        border-bottom: none;
      }
      .toggle-row label {
        margin: 0;
        font-weight: 400;
        font-size: 12px;
        cursor: pointer;
      }
      .toggle-row input[type="checkbox"] {
        width: auto;
        accent-color: var(--accent);
        cursor: pointer;
      }
      .toggle-row input[type="number"] {
        width: 64px;
        text-align: center;
        padding: 4px 6px;
        font-size: 11px;
      }

      /* --- Divider --- */
      .divider {
        height: 1px;
        background: var(--border);
        margin: 16px 0;
      }

      /* --- Note --- */
      .note {
        font-size: 11px;
        color: var(--text-secondary);
        margin: 12px 0 0;
      }

      /* --- Actions --- */
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }
      button {
        flex: 1;
        border: none;
        border-radius: var(--radius);
        padding: 8px 14px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s, opacity 0.15s;
      }
      button.primary {
        background: var(--accent);
        color: #fff;
      }
      button.primary:hover {
        background: var(--accent-hover);
      }
      button.secondary {
        background: var(--bg-secondary);
        color: var(--text);
      }
      button.secondary:hover {
        background: #eaeaea;
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* --- Status --- */
      .status {
        margin-top: 16px;
        padding: 8px 10px;
        background: var(--bg-secondary);
        border-radius: var(--radius);
        font-size: 12px;
        color: var(--text-secondary);
        min-height: 32px;
        display: flex;
        align-items: center;
      }
      progress {
        width: 100%;
        height: 4px;
        margin-top: 8px;
        border-radius: 2px;
        overflow: hidden;
        appearance: none;
        -webkit-appearance: none;
      }
      progress::-webkit-progress-bar {
        background: var(--bg-secondary);
        border-radius: 2px;
      }
      progress::-webkit-progress-value {
        background: var(--accent);
        border-radius: 2px;
        transition: width 0.2s ease;
      }
      .log {
        margin-top: 8px;
        font-size: 11px;
        color: var(--text-secondary);
        max-height: 100px;
        overflow: auto;
        white-space: pre-wrap;
        font-family: "SF Mono", "Fira Code", monospace;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h2>Screenshot Localiser</h2>

    <div class="section">
      <div class="section-title">API</div>
      <div class="field">
        <label for="apiKey">Gemini API key</label>
        <input id="apiKey" type="password" placeholder="Paste your key" />
      </div>
      <div class="field">
        <label for="model">Model</label>
        <input id="model" type="text" placeholder="gemini-2.5-flash" />
      </div>
    </div>

    <div class="section">
      <div class="section-title">Locales</div>
      <div class="field">
        <label for="locales">Target locales (comma or line separated)</label>
        <textarea id="locales"></textarea>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Export</div>
      <div class="row">
        <div class="field">
          <label for="format">Format</label>
          <select id="format">
            <option value="PNG">PNG</option>
            <option value="JPG">JPG</option>
          </select>
        </div>
        <div class="field">
          <label for="scale">Scale</label>
          <input id="scale" type="number" min="1" max="4" step="0.5" value="1" />
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Options</div>
      <div class="toggle-row">
        <label for="keep-duplicates">Keep translated duplicates</label>
        <input id="keep-duplicates" type="checkbox" />
      </div>
      <div class="toggle-row">
        <label for="shrink-text">Shrink text to fit</label>
        <input id="shrink-text" type="checkbox" checked />
      </div>
      <div class="toggle-row">
        <label for="min-shrink-scale">Minimum shrink scale</label>
        <input
          id="min-shrink-scale"
          type="number"
          min="0.1"
          max="1"
          step="0.05"
          value="0.7"
        />
      </div>
      <div class="toggle-row">
        <label for="download-zip">Download ZIP</label>
        <input id="download-zip" type="checkbox" checked />
      </div>
    </div>

    <div class="note">Select the frames you want to localize before running.</div>

    <div class="actions">
      <button id="start" class="primary">Translate & Export</button>
      <button id="close" class="secondary">Close</button>
    </div>

    <div class="status" id="status">Ready.</div>
    <progress id="progress" max="100" value="0"></progress>
    <div class="log" id="log"></div>

    <script>
      const apiKeyEl = document.getElementById("apiKey");
      const modelEl = document.getElementById("model");
      const localesEl = document.getElementById("locales");
      const formatEl = document.getElementById("format");
      const scaleEl = document.getElementById("scale");
      const keepDuplicatesEl = document.getElementById("keep-duplicates");
      const shrinkTextEl = document.getElementById("shrink-text");
      const minShrinkScaleEl = document.getElementById("min-shrink-scale");
      const downloadZipEl = document.getElementById("download-zip");
      const statusEl = document.getElementById("status");
      const progressEl = document.getElementById("progress");
      const logEl = document.getElementById("log");
      const startBtn = document.getElementById("start");
      const closeBtn = document.getElementById("close");

      let zip = null;
      let fileCount = 0;
      let downloadZipEnabled = true;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function setProgress(value) {
        if (typeof value === "number") {
          progressEl.value = Math.max(0, Math.min(100, value));
        }
      }

      function appendLog(text) {
        if (!text) return;
        logEl.textContent += (logEl.textContent ? "\n" : "") + text;
        logEl.scrollTop = logEl.scrollHeight;
      }

      function getLocales() {
        return localesEl.value
          .split(/[,\n]/)
          .map((l) => l.trim())
          .filter(Boolean);
      }

      function setBusy(isBusy) {
        startBtn.disabled = isBusy;
        closeBtn.disabled = isBusy;
      }

      function updateShrinkControls() {
        minShrinkScaleEl.disabled = !shrinkTextEl.checked;
      }

      startBtn.onclick = () => {
        const apiKey = apiKeyEl.value.trim();
        const model = modelEl.value.trim() || "gemini-2.5-flash";
        const locales = getLocales();
        const exportFormat = formatEl.value;
        const scale = parseFloat(scaleEl.value || "1");
        const keepDuplicates = keepDuplicatesEl.checked;
        const shrinkText = shrinkTextEl.checked;
        const rawMinShrinkScale = parseFloat(minShrinkScaleEl.value || "0.7");
        const minShrinkScale = Number.isFinite(rawMinShrinkScale)
          ? Math.min(1, Math.max(0.1, rawMinShrinkScale))
          : 0.7;
        const downloadZip = downloadZipEl.checked;
        downloadZipEnabled = downloadZip;

        if (!apiKey) {
          setStatus("Please enter a Gemini API key.");
          return;
        }
        if (!locales.length) {
          setStatus("Please provide at least one locale.");
          return;
        }

        setProgress(0);
        logEl.textContent = "";
        parent.postMessage(
          {
            pluginMessage: {
              type: "start",
              settings: {
                apiKey,
                model,
                locales,
                exportFormat,
                scale,
                keepDuplicates,
                shrinkText,
                minShrinkScale,
                downloadZip,
              },
            },
          },
          "*"
        );
      };

      closeBtn.onclick = () => {
        parent.postMessage({ pluginMessage: { type: "close" } }, "*");
      };

      window.onmessage = async (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === "settings") {
          apiKeyEl.value = msg.settings.apiKey || "";
          modelEl.value = msg.settings.model || "gemini-2.5-flash";
          localesEl.value = (msg.settings.locales || []).join(", ");
          formatEl.value = msg.settings.exportFormat || "PNG";
          scaleEl.value = msg.settings.scale || 1;
          keepDuplicatesEl.checked = Boolean(msg.settings.keepDuplicates);
          shrinkTextEl.checked =
            msg.settings.shrinkText === undefined ? true : Boolean(msg.settings.shrinkText);
          minShrinkScaleEl.value =
            typeof msg.settings.minShrinkScale === "number"
              ? msg.settings.minShrinkScale
              : 0.7;
          downloadZipEl.checked =
            msg.settings.downloadZip === undefined ? true : Boolean(msg.settings.downloadZip);
          updateShrinkControls();
        }

        if (msg.type === "run-start") {
          setBusy(true);
          setStatus("Starting...");
          if (!downloadZipEnabled) {
            zip = null;
            fileCount = 0;
          }
        }

        if (msg.type === "progress") {
          if (msg.message) setStatus(msg.message);
          if (typeof msg.progress === "number") setProgress(msg.progress);
        }

        if (msg.type === "log") {
          appendLog(msg.message);
        }

        if (msg.type === "zip-start") {
          if (!downloadZipEnabled) return;
          zip = new JSZip();
          fileCount = 0;
        }

        if (msg.type === "zip-add" && zip && downloadZipEnabled) {
          const bytes =
            msg.bytes instanceof ArrayBuffer
              ? new Uint8Array(msg.bytes)
              : msg.bytes && msg.bytes.buffer
              ? new Uint8Array(msg.bytes.buffer)
              : msg.bytes;
          if (bytes) {
            zip.file(msg.path, bytes);
            fileCount += 1;
          }
        }

        if (msg.type === "zip-finish" && zip && downloadZipEnabled) {
          setStatus("Building ZIP...");
          const blob = await zip.generateAsync({ type: "blob" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = msg.zipName || "localized_screenshots.zip";
          link.click();
          URL.revokeObjectURL(url);
          setStatus(`Download ready (${fileCount} files).`);
        }

        if (msg.type === "error") {
          setStatus(msg.message || "Something went wrong.");
        }

        if (msg.type === "run-end") {
          setBusy(false);
        }
      };

      shrinkTextEl.onchange = updateShrinkControls;
      parent.postMessage({ pluginMessage: { type: "get-settings" } }, "*");
    </script>
  </body>
</html>
